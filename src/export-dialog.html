<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Export H.264</title>
<style>
:root{--bg:#f3f5f4;--surface:#fff;--line:#d9dfdc;--text:#202724;--muted:#6d7772;--accent:#20a979;--purple:#7963c7;--danger:#b8505e;--mono:"Cascadia Mono",Consolas,monospace;--sans:Arial,"Malgun Gothic",sans-serif}
*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0}body{overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:12px;letter-spacing:0}
button,input{font:inherit;letter-spacing:0}button{cursor:pointer}.dialog{height:100%;display:grid;grid-template-rows:auto auto 1fr auto;background:var(--surface)}
header{padding:22px 24px 17px;border-bottom:1px solid var(--line);background:#fafbfa}.eyebrow{font-family:var(--mono);font-size:9px;color:var(--accent)}h1{margin:6px 0 4px;font-size:20px;font-weight:650}.lead{margin:0;color:var(--muted);font-size:11px}
.titleSection{padding:16px 24px;border-bottom:1px solid var(--line)}label{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;font-family:var(--mono);font-size:9px;color:var(--muted)}#titleCount{color:#969e9a}input{width:100%;height:38px;padding:0 11px;border:1px solid #cbd2ce;border-radius:5px;background:#fff;color:var(--text);outline:none}input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(32,169,121,.12)}
.content{min-height:0;overflow:auto;padding:0 24px}.specs{margin:0;padding:10px 0;border-bottom:1px solid var(--line)}.specRow{min-height:28px;display:grid;grid-template-columns:132px minmax(0,1fr);align-items:center;border-bottom:1px solid #eef0ef}.specRow:last-child{border-bottom:0}.specRow dt{font-family:var(--mono);font-size:9px;color:var(--muted)}.specRow dd{margin:0;text-align:right;font-family:var(--mono);font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.specRow dd select{font-family:var(--mono);font-size:10px;text-align:right;border:1px solid #cbd2ce;border-radius:4px;background:#fff;color:var(--text);padding:3px 6px;outline:none}.specRow dd select:focus{border-color:var(--accent)}.specRow dd select:disabled{color:var(--muted);background:#f3f5f4}
.statusArea{padding:15px 0}.statusHead{display:flex;align-items:flex-end;justify-content:space-between}.state{font-family:var(--mono);font-size:10px;color:var(--purple)}.percent{font-family:var(--mono);font-size:27px;color:var(--text)}.track{height:7px;margin-top:9px;overflow:hidden;border-radius:3px;background:#e5e9e7}.fill{width:0;height:100%;background:var(--accent);transition:width .18s linear}.progressMeta{display:flex;justify-content:space-between;margin-top:8px;font-family:var(--mono);font-size:9px;color:var(--muted)}.message{min-height:34px;margin:12px 0 0;padding:9px 10px;border-left:3px solid var(--accent);background:#f2f8f5;color:#4d5a54;font-size:10px;line-height:1.45}.message.error{border-color:var(--danger);background:#fbf1f2;color:#8a3944}.outputPath{display:none;margin-top:10px;font-family:var(--mono);font-size:9px;color:var(--muted);overflow-wrap:anywhere}.outputPath.visible{display:block}
footer{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:14px 24px 18px;border-top:1px solid var(--line);background:#fafbfa}button{height:36px;border:1px solid #cbd2ce;border-radius:5px;background:#fff;color:#3c4641;font-family:var(--mono);font-size:10px}button:hover:not(:disabled){border-color:#97a39d;background:#f4f7f5}button.primary{border-color:var(--accent);background:var(--accent);color:#fff}button.primary:hover:not(:disabled){background:#178b63}button:disabled{cursor:default;opacity:.45}.openFolder{display:none;grid-column:1/-1}.openFolder.visible{display:block}
</style>
</head>
<body>
<main class="dialog">
  <header>
    <div class="eyebrow">EXPORT H.264</div>
    <h1>Render confirmation</h1>
    <p class="lead" id="leadText">Confirm the title and output info before starting the render.</p>
  </header>
  <section class="titleSection">
    <label for="projectTitle"><span>PROJECT TITLE</span><span id="titleCount">EDIT PANEL</span></label>
    <input id="projectTitle" maxlength="40" autocomplete="off" spellcheck="false" readonly>
  </section>
  <section class="content">
    <dl class="specs">
      <div class="specRow"><dt>FORMAT</dt><dd id="formatValue">H.264</dd></div>
      <div class="specRow"><dt>FRAME</dt><dd id="frameValue">1280 × 1080 · 60 FPS</dd></div>
      <div class="specRow"><dt>BITRATE</dt><dd id="bitrateValue"><select id="bitrateSelect" aria-label="Target bitrate"><option value="12">12 Mbps TARGET</option><option value="24">24 Mbps TARGET</option></select></dd></div>
      <div class="specRow"><dt>ENCODER</dt><dd>NVIDIA FIRST · CPU FALLBACK</dd></div>
      <div class="specRow"><dt>DURATION</dt><dd id="durationValue">--</dd></div>
      <div class="specRow"><dt>SOURCE</dt><dd id="sourceValue">--</dd></div>
      <div class="specRow"><dt>OUTPUT</dt><dd id="folderValue">--</dd></div>
    </dl>
    <div class="statusArea" aria-live="polite">
      <div class="statusHead"><span class="state" id="stateValue">READY</span><strong class="percent" id="percentValue">0%</strong></div>
      <div class="track"><div class="fill" id="progressFill"></div></div>
      <div class="progressMeta"><span id="frameProgress">0 / 0 FRAMES</span><span id="timeProgress">00:00 · --:-- LEFT</span></div>
      <p class="message" id="message">Press START EXPORT to begin rendering.</p>
      <div class="outputPath" id="outputPath"></div>
    </div>
  </section>
  <footer>
    <button id="cancelButton">CANCEL</button>
    <button class="primary" id="startButton">START EXPORT</button>
    <button class="openFolder" id="openFolderButton">OPEN OUTPUT FOLDER</button>
  </footer>
</main>
<script src="export-dialog.js"></script>
</body>
</html>
